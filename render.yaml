services:
  - type: web
    name: vote-log
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k eventlet -w 1 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: vote-log-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: vote-log-db
    databaseName: vote_log
    user: vote_log_user
    plan: free